<div class="login-wrapper d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                <div class="card login-card border-0 shadow-lg p-4 p-md-5 animation">
                    <div class="text-center mb-4">
                        <div class="logo-container mb-3 d-inline-block">
                            <img src="assets/logo.svg" alt="Logo" class="login-logo">
                        </div>
                        <h2 class="fw-bold text-dark">Iniciar Sesión</h2>
                    </div>
                    <form>
                        <div class="mb-4">
                            <label class="form-label fw-semibold small text-secondary">Nombre de usuario</label>
                            <div class="input-group custom-input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-person text-primary"></i>
                                </span>
                                <input type="text" class="form-control border-start-0 ps-0"
                                    placeholder="Introduce un nombre">
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label fw-semibold small text-secondary">
                                    Contraseña
                                </label>
                            </div>
                            <div class="input-group custom-input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-lock text-primary"></i>
                                </span>
                                <input [type]="mostrarPassword ? 'text' : 'password'"
                                    class="form-control border-start-0 border-end-0 ps-0"
                                    placeholder="Introduce una contraseña">
                                <button type="button" class="input-group-text bg-white border-start-0"
                                    (click)="togglePassword()">
                                    <i class="bi" [class.bi-eye]="!mostrarPassword"
                                        [class.bi-eye-slash]="mostrarPassword">
                                    </i>
                                </button>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4 px-1">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="recordarme">
                                <label class="form-check-label small text-secondary" for="recordarme">Recordarme</label>
                            </div>
                        </div>
                        <button class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-btn mb-4">ENTRAR
                            <i class="bi bi-box-arrow-in-right ms-2"></i>
                        </button>
                        <div class="text-center mt-2">
                            <p class="small text-secondary mb-0"> ¿No tienes cuenta?
                                <a routerLink="/registro" class="fw-bold text-primary text-decoration-none ms-1">
                                    Regístrate</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
