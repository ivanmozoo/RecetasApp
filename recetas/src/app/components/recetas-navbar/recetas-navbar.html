<nav class="navbar navbar-dark bg-dark py-3">
  <div class="container d-flex justify-content-between align-items-center flex-wrap">
    <a routerLink="/" class="navbar-brand d-flex align-items-center m-0">
      <img src="assets/logo.svg" class="logo" alt="Logo Recetas">
      <span class="fw-bold brand-text">{{title}}</span>
    </a>

    @if (!currentUser) {
      <div class="d-flex botones-nav flex-wrap">
        <button class="btn btn-outline-light fw-bold" routerLink="/login"
          type="button">{{btnLogin}}</button>
        <button class="btn btn-light fw-bold" routerLink="/register"
          type="button">{{btnRegistro}}</button>
      </div>
    } @else {
      <div class="d-flex align-items-center botones-nav flex-wrap">
        <button class="btn btn-outline-light fw-bold py-2" (click)="logout()">Cerrar sesión con {{currentUser.username}}</button>
      </div>
    }
  </div>
</nav>
