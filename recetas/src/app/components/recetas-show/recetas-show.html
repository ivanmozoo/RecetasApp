<nav class="bg-light py-3 mt-3 shadow-sm">
    <div class="container">
        <div class="row justify-content-between">
            <div class="col-md-5 ms-2">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white">
                        <i class="bi bi-basket"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="Buscar por ingrediente"
                        aria-label="Buscar por ingrediente">
                </div>
            </div>
            <div class="col-md-5 me-2">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="Buscar por nombre"
                        aria-label="Buscar por nombre">
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="mb-5 mt-3 row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
    @if (recetas && recetas.length) {
    @for (receta of recetas; track receta.id) {
    <div class="col">
        <div class="card h-100 shadow-sm">
            <img [src]="receta.imagen" class="card-img-top" [alt]="receta.nombre">
            <div class="card-body">
                <h5 class="card-title">{{receta.nombre}}</h5>
            </div>
        </div>
    </div>
    }
    } @else {
    <h3>No hay recetas disponibles</h3>
    }
</div>
