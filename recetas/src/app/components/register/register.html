<div class="register-wrapper d-flex align-items-center justify-content-center">
    @if (apiRunning) {
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                <div class="card register-card border-0 shadow-lg p-4 p-md-5 animation">
                    <div class="text-center mb-4">
                        <div class="logo-container mb-3 d-inline-block">
                            <img src="assets/logo.svg" alt="Logo" class="login-logo">
                        </div>
                        <h2 class="fw-bold text-dark mb-1">Registrarse</h2>
                    </div>
                    <form [formGroup]="form" (ngSubmit)="onSubmit()">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-secondary">Nombre de usuario</label>
                            <div class="input-group custom-input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-person text-primary"></i>
                                </span>
                                <input type="text" formControlName="username" class="form-control border-start-0 ps-0"
                                    placeholder="Crea un nombre de usuario">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-secondary">Contraseña</label>
                            <div class="input-group custom-input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-lock text-primary"></i>
                                </span>
                                <input type="password" formControlName="password"
                                    class="form-control border-start-0 ps-0" placeholder="Crea una contraseña">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-secondary">Confirmar</label>
                            <div class="input-group custom-input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-shield-check text-primary"></i>
                                </span>
                                <input type="password" formControlName="confirmPassword"
                                    class="form-control border-start-0 ps-0" placeholder="Confirma la contraseña">
                            </div>
                        </div>
                        <button type="submit"
                            class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-btn mt-3 mb-4">CREAR
                            CUENTA
                            <i class="bi bi-check-circle ms-2"></i>
                        </button>
                        <div class="text-center">
                            <p class="small text-secondary mb-0"> ¿Ya tienes cuenta?
                                <a routerLink="/login" class="fw-bold text-primary text-decoration-none ms-1">Inicia
                                    Sesión</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    }
</div>
